<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Opening OKX...</title>
<style>
body{background:#1a1a2e;color:#fff;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center}
.box{padding:20px}
.spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#7DF000;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
a{color:#7DF000;text-decoration:none;font-size:16px}
p{color:#aaa;font-size:14px;margin-top:16px}
</style>
</head>
<body>
<div class="box">
    <div class="spinner"></div>
    <div id="status">Opening OKX...</div>
    <p id="fallback" style="display:none">
        <a id="direct-link" href="#">Tap here to try again</a>
        <br><br>
        <a id="store-link" href="#">Download app</a>
    </p>
</div>
<script>
(function() {
    var params = new URLSearchParams(window.location.search);
    var uri = params.get('uri') || '';
    var app = params.get('app') || 'wallet';
    var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    if (!uri) {
        document.getElementById('status').textContent = 'Error: missing URI parameter';
        return;
    }

    // App config: package name, scheme, store links
    var apps = {
        wallet: {
            pkg: 'com.okx.wallet',
            scheme: 'okxwallet',
            storeAndroid: 'https://play.google.com/store/apps/details?id=com.okx.wallet',
            storeIOS: 'https://apps.apple.com/app/okx-wallet-crypto-web3/id6743309484'
        },
        okx: {
            pkg: 'com.okinc.okex.gp',
            scheme: 'okx',
            storeAndroid: 'https://play.google.com/store/apps/details?id=com.okinc.okex.gp',
            storeIOS: 'https://apps.apple.com/app/okx-buy-bitcoin-btc-crypto/id1327268470'
        }
    };

    var cfg = apps[app] || apps.wallet;
    var storeUrl = isIOS ? cfg.storeIOS : cfg.storeAndroid;

    // Build custom scheme deep link: okxwallet://ul/v1/wc?uri=...
    var deepLink = cfg.scheme + '://ul/v1/wc?uri=' + encodeURIComponent(uri);

    if (isIOS) {
        // iOS: custom scheme directly — Safari prompts "Open in OKX Wallet?"
        document.getElementById('direct-link').href = deepLink;
        document.getElementById('store-link').href = storeUrl;
        window.location.href = deepLink;
    } else {
        // Android: intent:// URI — Chrome opens app by package name
        var intentUrl = 'intent://ul/v1/wc?uri=' + encodeURIComponent(uri)
            + '#Intent;scheme=' + cfg.scheme
            + ';package=' + cfg.pkg
            + ';end';
        document.getElementById('direct-link').href = intentUrl;
        document.getElementById('store-link').href = storeUrl;
        window.location.href = intentUrl;
    }

    // Show fallback after 2s
    setTimeout(function() {
        document.getElementById('status').textContent = 'App not responding';
        document.getElementById('fallback').style.display = 'block';
    }, 2000);
})();
</script>
</body>
</html>
