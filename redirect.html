<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Opening OKX...</title>
<style>
body{background:#1a1a2e;color:#fff;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center}
.box{padding:20px}
.spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#7DF000;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
a{color:#7DF000;text-decoration:none;font-size:16px}
p{color:#aaa;font-size:14px;margin-top:16px}
</style>
</head>
<body>
<div class="box">
    <div class="spinner"></div>
    <div id="status">Opening OKX...</div>
    <p id="fallback" style="display:none">
        <a id="direct-link" href="#">Tap here to try again</a>
        <br><br>
        <a id="store-link" href="#">Download app</a>
    </p>
</div>
<script>
(function() {
    var params = new URLSearchParams(window.location.search);
    var uri = params.get('uri') || '';
    var app = params.get('app') || 'wallet';

    if (!uri) {
        document.getElementById('status').textContent = 'Error: missing URI parameter';
        return;
    }

    // App config: package name, scheme, store link
    var apps = {
        wallet: {
            pkg: 'com.okx.wallet',
            scheme: 'okxwallet',
            store: 'https://play.google.com/store/apps/details?id=com.okx.wallet'
        },
        okx: {
            pkg: 'com.okinc.okex.gp',
            scheme: 'okx',
            store: 'https://play.google.com/store/apps/details?id=com.okinc.okex.gp'
        }
    };

    var cfg = apps[app] || apps.wallet;

    // Android intent:// URI — Chrome opens app by package name, no App Links needed
    var intentUrl = 'intent://ul/v1/wc?uri=' + encodeURIComponent(uri)
        + '#Intent;scheme=' + cfg.scheme
        + ';package=' + cfg.pkg
        + ';end';

    // Set fallback links
    document.getElementById('direct-link').href = intentUrl;
    document.getElementById('store-link').href = cfg.store;

    // Auto-redirect
    window.location.href = intentUrl;

    // Show fallback after 2s
    setTimeout(function() {
        document.getElementById('status').textContent = 'App not responding';
        document.getElementById('fallback').style.display = 'block';
    }, 2000);
})();
</script>
</body>
</html>
