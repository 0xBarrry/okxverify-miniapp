<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Opening OKX Wallet...</title>
<style>
body{background:#1a1a2e;color:#fff;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center}
.box{padding:20px}
.spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#7DF000;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
a{color:#7DF000;text-decoration:none;font-size:16px}
p{color:#aaa;font-size:14px;margin-top:16px}
</style>
</head>
<body>
<div class="box">
    <div class="spinner"></div>
    <div id="status">Opening OKX Wallet...</div>
    <p id="fallback" style="display:none">
        <a id="direct-link" href="#">Tap here if OKX Wallet didn't open</a>
        <br><br>
        <a href="https://play.google.com/store/apps/details?id=com.okx.wallet">Download OKX Wallet</a>
    </p>
</div>
<script>
(function() {
    var params = new URLSearchParams(window.location.search);
    var uri = params.get('uri') || '';
    var scheme = params.get('scheme') || 'okxwallet';

    if (!uri) {
        document.getElementById('status').textContent = 'Error: missing URI parameter';
        return;
    }

    var deepLink = scheme + '://ul/v1/wc?uri=' + encodeURIComponent(uri);

    // Set direct link for manual tap
    document.getElementById('direct-link').href = deepLink;

    // Auto-redirect via location.href (works in Chrome for custom schemes)
    window.location.href = deepLink;

    // Show fallback after 2s if still on this page
    setTimeout(function() {
        document.getElementById('status').textContent = 'OKX Wallet not responding';
        document.getElementById('fallback').style.display = 'block';
    }, 2000);
})();
</script>
</body>
</html>
